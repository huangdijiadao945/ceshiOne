<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="金企鹅比特币交易网 - 用户登录">
    <title>登录 - 金企鹅比特币交易网</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <!-- 网站Logo图像模块 -->
    <header class="login-header">
        <div class="container">
            <div class="logo">
                <img src="https://cdn-icons-png.flaticon.com/512/235/235359.png" alt="金企鹅Logo">
                <span class="logo-text">金企鹅比特币交易网</span>
            </div>
        </div>
    </header>

    <!-- 登录主体 -->
    <main class="login-main">
        <div class="login-wrapper">
            <!-- 宣传语模块 -->
            <div class="login-promo">
                <img src="https://cdn-icons-png.flaticon.com/512/6124/6124998.png" alt="比特币">
                <h2>欢迎回来</h2>
                <p>登录您的账户，开始数字货币交易之旅</p>
                <ul class="promo-features">
                    <li>实时行情，精准把握市场脉搏</li>
                    <li>安全交易，银行级资金保障</li>
                    <li>极速充提，资金快速到账</li>
                    <li>专业服务，7×24小时在线客服</li>
                </ul>
            </div>

            <!-- 登录表单模块 -->
            <div class="login-form-area">
                <h2>账户登录</h2>
                <p class="login-subtitle">请输入您的账户信息</p>
                <form action="#" method="post">
                    <div class="form-group">
                        <label for="username">用户名 / 邮箱 / 手机号</label>
                        <input type="text" id="username" name="username" placeholder="请输入用户名、邮箱或手机号" required>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" placeholder="请输入登录密码" required>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember"> 记住我
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>
                    <button type="submit" class="btn-login-submit">登 录</button>
                </form>
                <div class="login-divider">其他登录方式</div>
                <div class="social-login">
                    <a href="#" class="social-btn">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="微信">
                    </a>
                    <a href="#" class="social-btn">
                        <img src="https://cdn-icons-png.flaticon.com/512/145/145802.png" alt="QQ">
                    </a>
                    <a href="#" class="social-btn">
                        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google">
                    </a>
                </div>
                <p class="register-link">还没有账户？<a href="register.html">立即注册</a></p>
            </div>
        </div>
    </main>

    <!-- 页脚模块 -->
    <footer class="login-footer">
        <p>
            <a href="#">关于我们</a>
            <a href="#">用户协议</a>
            <a href="#">隐私政策</a>
            <a href="#">帮助中心</a>
        </p>
        <p style="margin-top: 10px;">Copyright &copy; 2025 金企鹅比特币交易网 GoldPenguin.com 版权所有</p>
    </footer>
</body>
</html>
