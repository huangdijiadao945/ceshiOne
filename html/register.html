<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="金企鹅比特币交易网 - 用户注册">
    <title>注册 - 金企鹅比特币交易网</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
    <!-- 网站Logo图像模块 -->
    <header class="register-header">
        <div class="container">
            <div class="logo">
                <img src="https://cdn-icons-png.flaticon.com/512/235/235359.png" alt="金企鹅Logo">
                <span class="logo-text">金企鹅比特币交易网</span>
            </div>
        </div>
    </header>

    <!-- 注册主体 -->
    <main class="register-main">
        <div class="register-wrapper">
            <!-- 宣传语模块 -->
            <div class="register-promo">
                <img src="https://cdn-icons-png.flaticon.com/512/2539/2539191.png" alt="注册">
                <h2>加入金企鹅</h2>
                <p>注册账户，开启您的数字货币投资之旅</p>
                <ul class="promo-benefits">
                    <li>注册即送新手体验金</li>
                    <li>享受超低交易手续费</li>
                    <li>专属客服一对一服务</li>
                    <li>实时行情推送提醒</li>
                    <li>多重安全保障机制</li>
                </ul>
            </div>

            <!-- 注册表单模块 -->
            <div class="register-form-area">
                <h2>创建账户</h2>
                <p class="register-subtitle">填写以下信息完成注册</p>
                <form action="#" method="post">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" placeholder="请设置用户名（4-20位字符）" required>
                    </div>
                    <div class="form-group">
                        <label for="email">邮箱地址</label>
                        <input type="email" id="email" name="email" placeholder="请输入常用邮箱" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">手机号码</label>
                        <input type="tel" id="phone" name="phone" placeholder="请输入手机号码" required>
                    </div>
                    <div class="form-group">
                        <label for="verify-code">验证码</label>
                        <div class="verification-group">
                            <input type="text" id="verify-code" name="verify-code" placeholder="请输入验证码" required>
                            <button type="button" class="btn-verify">获取验证码</button>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">登录密码</label>
                            <input type="password" id="password" name="password" placeholder="请设置密码" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">确认密码</label>
                            <input type="password" id="confirm-password" name="confirm-password" placeholder="请再次输入密码" required>
                        </div>
                    </div>
                    <div class="agreement">
                        <input type="checkbox" id="agree" name="agree" required>
                        <label for="agree">我已阅读并同意 <a href="#">《用户服务协议》</a> 和 <a href="#">《隐私政策》</a></label>
                    </div>
                    <button type="submit" class="btn-register-submit">注 册</button>
                </form>
                <p class="login-link">已有账户？<a href="login.html">立即登录</a></p>
            </div>
        </div>
    </main>

    <!-- 页脚模块 -->
    <footer class="register-footer">
        <p>
            <a href="#">关于我们</a>
            <a href="#">用户协议</a>
            <a href="#">隐私政策</a>
            <a href="#">帮助中心</a>
        </p>
        <p style="margin-top: 10px;">Copyright &copy; 2025 金企鹅比特币交易网 GoldPenguin.com 版权所有</p>
    </footer>
</body>
</html>
